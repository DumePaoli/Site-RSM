name: Auto-translate i18n

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/i18n.js'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Translate missing keys
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/translate.mjs

      - name: Commit translations if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/i18n.js
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "i18n: auto-translate missing keys [skip ci]"
            git push
          fi
